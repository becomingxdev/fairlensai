spring.application.name=demo

# Use PORT env var if available (default 8080)
server.port=${PORT:8080}

# Firebase Configuration
# Can be a path or a direct JSON string in an env var
firebase.config.path=${FIREBASE_CONFIG_PATH:classpath:firebaseAdminSdk.json}
firebase.credentials=${FIREBASE_CREDENTIALS:}

# PostgreSQL Database Connection
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/neondb}
spring.datasource.username=${DB_USER:neondb_owner}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS Configuration
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}